# ══════════════════════════════════════════════════════
# application.yml — Configuração base da aplicação
# Valores sensíveis vêm de variáveis de ambiente (.env)
# ══════════════════════════════════════════════════════

server:
  port: 8081

spring:
  application:
    name: tribo-backend

  # ── Banco de Dados ──────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tribo}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # ── JPA / Hibernate ─────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # ── Migrations (Flyway) ──────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # ── Cache: NONE por enquanto ─────────────────────────
  # Reativar quando implementarmos DTOs serializáveis.
  cache:
    type: none

  # ── Email ────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── JWT ──────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:tribo-change-this-in-production-min-32-chars}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900}       # 15 min em segundos
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}  # 7 dias em segundos

# ── SafeVideo (Eduzz) ────────────────────────────────
safevideo:
  token: ${SAFEVIDEO_TOKEN:}
  player-url: ${SAFEVIDEO_PLAYER_URL:https://player.safevideo.com.br}

# ── Panda Video (fallback) ───────────────────────────
panda:
  api-key: ${PANDA_API_KEY:}
  player-url: ${PANDA_PLAYER_URL:https://player-vz-tribo.tv.pandavideo.com.br}

# ── Stripe ──────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

# ── CORS ─────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:8080}

# ── Logging ─────────────────────────────────────────
logging:
  level:
    com.tribo: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
