# ══════════════════════════════════════════════════════
# application.yml — Tribo Invest Play Backend
# Valores sensíveis vêm de variáveis de ambiente
# ══════════════════════════════════════════════════════

server:
  port: 8081
  # Virtual Threads (Java 21) — suporta muito mais conexões simultâneas
  # sem aumentar memória. Crítico para 10k+ usuários.
  tomcat:
    threads:
      max: 200
      min-spare: 20

spring:
  application:
    name: tribo-backend

  # Virtual threads — habilita para toda a aplicação (Java 21)
  threads:
    virtual:
      enabled: true

  # ── Banco de Dados ──────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tribo}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      # Para 10k usuários simultâneos:
      # Cada request pode precisar de 1 conexão DB.
      # PostgreSQL suporta ~100-200 conexões sem pg_bouncer.
      # Railway: verificar limite do plano.
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 20000       # 20s — falha rápido se DB estiver lento
      idle-timeout: 600000            # 10min
      max-lifetime: 1800000           # 30min — evita conexões zumbis
      keepalive-time: 30000           # 30s — mantém conexões vivas no Railway
      leak-detection-threshold: 60000 # Detecta vazamentos de conexão

  # ── JPA / Hibernate ─────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25          # Batch inserts/updates para performance
          fetch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false

  # ── Migrations (Flyway) ──────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20   # Conexões Redis simultâneas
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

  # ── Cache Redis ──────────────────────────────────────
  # ATIVO — com serialização JSON configurada em RedisConfig.java
  # Caches: subscription-check (10min), published-courses (5min)
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 min padrão (em ms)

  # ── Email ────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── JWT ──────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:tribo-change-this-in-production-min-32-chars}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900}       # 15 min
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}  # 7 dias

# ── SafeVideo (Eduzz) ────────────────────────────────
safevideo:
  token: ${SAFEVIDEO_TOKEN:}
  player-url: ${SAFEVIDEO_PLAYER_URL:https://player.safevideo.com.br}

# ── Panda Video ──────────────────────────────────────
panda:
  api-key: ${PANDA_API_KEY:}
  player-url: ${PANDA_PLAYER_URL:https://player-vz-tribo.tv.pandavideo.com.br}

# ── Stripe ──────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price:
    tribo:    ${STRIPE_PRICE_TRIBO:}     # Price ID do plano Tribo (mensal)
    financas: ${STRIPE_PRICE_FINANCAS:}  # Price ID do Finanças (pagamento único)
    combo:    ${STRIPE_PRICE_COMBO:}     # Price ID do Combo (mensal)

# ── CORS ─────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:8080}

# ── Resend ─────────────────────────────────────────────
resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:Tribo Invest Play <noreply@triboinvest.com.br>}

# ── Sentry — Observabilidade e Error Tracking ────────
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.2          # Amostra 20% das transações (custo x visibilidade)
  environment: ${ENVIRONMENT:development}
  release: ${APP_VERSION:1.0.0}
  send-default-pii: false          # LGPD: não enviar dados pessoais ao Sentry

# ── Swagger / OpenAPI ────────────────────────────────
# Desabilitado em produção por padrão.
# Para habilitar em dev: set SWAGGER_ENABLED=true
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

# ── Actuator ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true

# ── Logging ─────────────────────────────────────────
logging:
  level:
    com.tribo: INFO        # INFO em produção — DEBUG em dev via LOG_LEVEL
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.cache: WARN
