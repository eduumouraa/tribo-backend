# ══════════════════════════════════════════════════════
# application-dev.yml — Overrides para desenvolvimento local
# Ativo com: spring.profiles.active=dev
# ══════════════════════════════════════════════════════

spring:
  jpa:
    properties:
      hibernate:
        format_sql: true             # SQL formatado no console em dev

logging:
  level:
    com.tribo: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # mostra parâmetros das queries
